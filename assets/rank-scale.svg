<svg width="960" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0b0d"/>
      <stop offset="50%" style="stop-color:#160a26"/>
      <stop offset="100%" style="stop-color:#0a0b0d"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e1b4b" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
    </marker>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="220" fill="url(#bgGrad)" rx="12"/>
  <rect width="960" height="220" fill="url(#grid)" rx="12"/>

  <rect x="12" y="12" width="22" height="3" fill="#7c3aed" opacity="0.8"/>
  <rect x="12" y="12" width="3" height="22" fill="#7c3aed" opacity="0.8"/>
  <rect x="926" y="12" width="22" height="3" fill="#6366f1" opacity="0.8"/>
  <rect x="945" y="12" width="3" height="22" fill="#6366f1" opacity="0.8"/>
  <rect x="12" y="205" width="22" height="3" fill="#7c3aed" opacity="0.8"/>
  <rect x="12" y="183" width="3" height="22" fill="#7c3aed" opacity="0.8"/>
  <rect x="926" y="205" width="22" height="3" fill="#6366f1" opacity="0.8"/>
  <rect x="945" y="183" width="3" height="22" fill="#6366f1" opacity="0.8"/>

  <text x="480" y="34" text-anchor="middle" font-family="'Courier New',monospace" font-size="14"
        font-weight="bold" fill="#e879f9" letter-spacing="2" filter="url(#softglow)">RANK SCALE &#8212; DRIVEN BY REAL CVSS v3.1 SCORING, NOT HAND-PICKED LABELS</text>

  <!-- 8 rank pills, F (lowest) through SSS (highest), left to right -->
  <!-- pill width 95, gap 15, starting x 47 -->

  <g font-family="'Courier New',monospace" text-anchor="middle">
    <!-- F -->
    <rect x="47" y="56" width="95" height="62" rx="8" fill="#4b5563"/>
    <text x="94" y="90" font-size="20" font-weight="bold" fill="#ffffff">F</text>
    <text x="94" y="134" font-size="10" fill="#9ca3af">INFORMATIONAL</text>

    <!-- D -->
    <rect x="157" y="56" width="95" height="62" rx="8" fill="#6b7280"/>
    <text x="204" y="90" font-size="20" font-weight="bold" fill="#ffffff">D</text>
    <text x="204" y="134" font-size="10" fill="#9ca3af">HARDENING</text>

    <!-- C -->
    <rect x="267" y="56" width="95" height="62" rx="8" fill="#5aa9e6"/>
    <text x="314" y="90" font-size="20" font-weight="bold" fill="#0a0b0d">C</text>
    <text x="314" y="134" font-size="10" fill="#9ca3af">LOW</text>

    <!-- B -->
    <rect x="377" y="56" width="95" height="62" rx="8" fill="#e8d44d"/>
    <text x="424" y="90" font-size="20" font-weight="bold" fill="#0a0b0d">B</text>
    <text x="424" y="134" font-size="10" fill="#9ca3af">MEDIUM</text>

    <!-- A -->
    <rect x="487" y="56" width="95" height="62" rx="8" fill="#f0a824"/>
    <text x="534" y="90" font-size="20" font-weight="bold" fill="#0a0b0d">A</text>
    <text x="534" y="134" font-size="10" fill="#9ca3af">HIGH</text>

    <!-- S -->
    <rect x="597" y="56" width="95" height="62" rx="8" fill="#ff7a45"/>
    <text x="644" y="90" font-size="20" font-weight="bold" fill="#0a0b0d">S</text>
    <text x="644" y="134" font-size="10" fill="#9ca3af">CRITICAL</text>

    <!-- SS -->
    <rect x="707" y="56" width="95" height="62" rx="8" fill="#ff4d4d" filter="url(#softglow)"/>
    <text x="754" y="90" font-size="19" font-weight="bold" fill="#ffffff">SS</text>
    <text x="754" y="134" font-size="10" fill="#fca5a5">DEVASTATING</text>

    <!-- SSS -->
    <rect x="817" y="56" width="95" height="62" rx="8" fill="#ff2d55" filter="url(#softglow)"/>
    <text x="864" y="90" font-size="17" font-weight="bold" fill="#ffffff">SSS</text>
    <text x="864" y="134" font-size="10" fill="#fca5a5">EXTINCTION</text>
  </g>

  <!-- severity arrow beneath the ladder -->
  <line x1="47" y1="156" x2="905" y2="156" stroke="#a855f7" stroke-width="1.5" opacity="0.7" marker-end="url(#arrowhead)"/>
  <text x="476" y="176" text-anchor="middle" font-family="'Courier New',monospace" font-size="11"
        fill="#a5b4fc" letter-spacing="3" opacity="0.85">INCREASING SEVERITY</text>

  <!-- caption -->
  <text x="480" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="10"
        fill="#6366f1" opacity="0.75">SS/SSS are chain escalations &#8212; corroborating findings the tool correlates automatically</text>
</svg>
