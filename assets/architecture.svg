<svg width="1000" height="620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0b0d"/>
      <stop offset="50%" style="stop-color:#160a26"/>
      <stop offset="100%" style="stop-color:#0a0b0d"/>
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e1b4b" stroke-width="0.5" opacity="0.35"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b7fd9"/>
    </marker>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="620" fill="url(#bgGrad)" rx="12"/>
  <rect width="1000" height="620" fill="url(#grid)" rx="12"/>

  <!-- corner brackets, matching banner.svg -->
  <rect x="12" y="12" width="24" height="3" fill="#7c3aed" opacity="0.8"/>
  <rect x="12" y="12" width="3" height="24" fill="#7c3aed" opacity="0.8"/>
  <rect x="964" y="12" width="24" height="3" fill="#6366f1" opacity="0.8"/>
  <rect x="985" y="12" width="3" height="24" fill="#6366f1" opacity="0.8"/>
  <rect x="12" y="605" width="24" height="3" fill="#7c3aed" opacity="0.8"/>
  <rect x="12" y="581" width="3" height="24" fill="#7c3aed" opacity="0.8"/>
  <rect x="964" y="605" width="24" height="3" fill="#6366f1" opacity="0.8"/>
  <rect x="985" y="581" width="3" height="24" fill="#6366f1" opacity="0.8"/>

  <text x="500" y="42" text-anchor="middle" font-family="'Courier New',monospace" font-size="18"
        font-weight="bold" fill="#e879f9" letter-spacing="3" filter="url(#softglow)">HOW GODSEYE: EX READS AN EXTENSION</text>

  <!-- Row 1: source -->
  <rect x="360" y="66" width="280" height="42" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="500" y="92" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" fill="#e0d9ff">EXTENSION SOURCE (.crx/.xpi/dir)</text>

  <line x1="500" y1="108" x2="500" y2="132" stroke="#8b7fd9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 2: unpacker -->
  <rect x="360" y="134" width="280" height="42" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="500" y="160" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" fill="#e0d9ff">STRING UNPACKER (deobfuscate)</text>

  <line x1="500" y1="176" x2="500" y2="200" stroke="#8b7fd9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Row 3: tokenizer hub -->
  <rect x="340" y="202" width="320" height="46" rx="6" fill="#2b1655" stroke="#c084fc" stroke-width="2"/>
  <text x="500" y="230" text-anchor="middle" font-family="'Courier New',monospace" font-size="14" font-weight="bold" fill="#f3e8ff">SINGLE-PASS TOKENIZER</text>

  <!-- fan out to 3 resolvers -->
  <line x1="420" y1="248" x2="190" y2="296" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="500" y1="248" x2="500" y2="296" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="580" y1="248" x2="810" y2="296" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="70" y="298" width="240" height="42" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.3"/>
  <text x="190" y="324" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#c7d2fe">ALIAS TRACKER</text>

  <rect x="380" y="298" width="240" height="42" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.3"/>
  <text x="500" y="324" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#c7d2fe">BLOCK RESOLVER</text>

  <rect x="690" y="298" width="240" height="42" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.3"/>
  <text x="810" y="324" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#c7d2fe">OBJECT-LITERAL RESOLVER</text>

  <!-- converge to shared index -->
  <line x1="190" y1="340" x2="440" y2="380" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="500" y1="340" x2="500" y2="380" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="810" y1="340" x2="560" y2="380" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="300" y="382" width="400" height="46" rx="6" fill="#2b1655" stroke="#e879f9" stroke-width="2"/>
  <text x="500" y="410" text-anchor="middle" font-family="'Courier New',monospace" font-size="14" font-weight="bold" fill="#fce7f3">SHARED SOURCE INDEX (read-only)</text>

  <!-- fan out to consumers -->
  <line x1="420" y1="428" x2="190" y2="476" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="500" y1="428" x2="500" y2="476" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="580" y1="428" x2="810" y2="476" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="70" y="478" width="240" height="42" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.3"/>
  <text x="190" y="504" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#e0d9ff">16 ANALYSIS MODULES</text>

  <rect x="380" y="478" width="240" height="42" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.3"/>
  <text x="500" y="504" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#e0d9ff">TAINT TRACER</text>

  <rect x="690" y="478" width="240" height="42" rx="6" fill="#1e1b4b" stroke="#a855f7" stroke-width="1.3"/>
  <text x="810" y="504" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#e0d9ff">CONTEXT BRIDGE MATRIX</text>

  <!-- converge to chains -->
  <line x1="190" y1="520" x2="440" y2="552" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="500" y1="520" x2="500" y2="552" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="810" y1="520" x2="560" y2="552" stroke="#8b7fd9" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="320" y="554" width="360" height="42" rx="6" fill="#2b1655" stroke="#f472b6" stroke-width="2"/>
  <text x="500" y="580" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#fce7f3">CHAIN CORRELATION · 14 RULES</text>
</svg>
